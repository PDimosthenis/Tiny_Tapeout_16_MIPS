name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install Python packages
        shell: bash
        run: |
          source .venv/bin/activate
          pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make
          test -f results.xml
          # make can still exit successfully even if the test body reports a failure,
          # so fail the job when the JUnit report contains a failure entry.
          ! grep -q failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.3
        with:
          paths: "test/results.xml"
        if: always() && hashFiles('test/results.xml') != ''

      - name: upload vcd
        if: (success() || failure()) && hashFiles('test/results.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-vcd
          path: |
            test/tb.vcd
            test/results.xml
