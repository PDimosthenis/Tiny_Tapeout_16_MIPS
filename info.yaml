# Tiny Tapeout project information
project:
  title:       "16-bit MIPS Single Cycle Processor"
  author:      "Dimosthenis Papathanasiou , Andreas Skoufakis"                      # Your name
  #discord:     ""                      # Your Discord handle (optional)
  description: "A complete 16-bit MIPS single-cycle processor that loads 16-bit instructions through the existing 8-bit Tiny Tapeout input pins" 
  language:    "Verilog"                              # Language used
  clock_hz:    10000000                               # Clock frequency in Hz (10 MHz)

  # Tile usage (single tile of about 160 x 100 um)
  tiles: "1x1"                                       # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 8x2

  # Top module (must start with "tt_um_")
  top_module: "tt_um_top_module_16_mips"

  # Source files in ./src directory
  source_files:
    - project.v

# Pinout configuration
pinout:
  # Inputs (instruction byte on ui[7:0] during load mode)
  ui[0]: "Instruction byte bit 0"
  ui[1]: "Instruction byte bit 1"
  ui[2]: "Instruction byte bit 2"
  ui[3]: "Instruction byte bit 3"
  ui[4]: "Instruction byte bit 4"
  ui[5]: "Instruction byte bit 5"
  ui[6]: "Byte select: 0=low byte, 1=high byte"
  ui[7]: "Mode select: 0=load, 1=run"

  # Outputs (lower 8 bits of ALU result)
  uo[0]: "ALU_out[0] - Result bit 0"
  uo[1]: "ALU_out[1] - Result bit 1"
  uo[2]: "ALU_out[2] - Result bit 2"
  uo[3]: "ALU_out[3] - Result bit 3"
  uo[4]: "ALU_out[4] - Result bit 4"
  uo[5]: "ALU_out[5] - Result bit 5"
  uo[6]: "ALU_out[6] - Result bit 6"
  uo[7]: "ALU_out[7] - Result bit 7"

  # Bidirectional pins (PC lower 4 bits in run mode)
  uio[0]: "PC[0] - Program Counter bit 0"
  uio[1]: "PC[1] - Program Counter bit 1"
  uio[2]: "PC[2] - Program Counter bit 2"
  uio[3]: "PC[3] - Program Counter bit 3"
  uio[4]: "Unused output"
  uio[5]: "Unused output"
  uio[6]: "Byte select input during load mode"
  uio[7]: "Mode select input"

# Do not change this version number!
yaml_version: 6